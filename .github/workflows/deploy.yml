name: Deploy to ECS

# 方案A: SSH 直连部署
# 触发条件: push 到 main 分支自动部署，也支持手动触发
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rebuild:
        description: "强制重新构建镜像 (no-cache)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# 同一时间只允许一个部署，避免冲突
concurrency:
  group: deploy-ecs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          # 构建可能较慢，给足超时
          command_timeout: 18m
          # 在远程执行的脚本
          script: |
            set -e
            echo "=========================================="
            echo "AICCP 部署开始 - $(date '+%Y-%m-%d %H:%M:%S')"
            echo "触发: ${{ github.event.head_commit.message || '手动触发' }}"
            echo "=========================================="

            cd /opt/aicc

            # ---- 1. 拉取最新代码 ----
            echo "[1/6] 拉取最新代码..."
            git fetch origin main
            git reset --hard origin/main
            echo "当前版本: $(git log --oneline -1)"

            # ---- 2. 确认 .env.production 存在 ----
            if [ ! -f .env.production ]; then
              echo "ERROR: .env.production 不存在！请先在服务器上配置。"
              exit 1
            fi

            # ---- 3. 构建镜像 ----
            REBUILD_FLAG=""
            if [ "${{ github.event.inputs.rebuild }}" = "true" ]; then
              REBUILD_FLAG="--no-cache"
              echo "[2/6] 强制无缓存构建镜像..."
            else
              echo "[2/6] 构建镜像..."
            fi

            docker compose -f docker-compose.prod.yml --env-file .env.production build $REBUILD_FLAG

            # ---- 4. 启动/更新容器 ----
            echo "[3/6] 启动容器..."
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans

            # ---- 5. 健康检查 ----
            echo "[4/6] 等待服务启动..."
            sleep 8

            echo "检查 frontend (nginx :80)..."
            if curl -sf http://localhost/ >/dev/null 2>&1; then
              echo "  frontend: OK"
            else
              echo "  frontend: FAILED - 检查 docker logs aicc-frontend"
            fi

            echo "检查 backend (uvicorn :8000)..."
            if curl -sf http://localhost:8000/health >/dev/null 2>&1; then
              echo "  backend: OK"
            else
              echo "  backend: FAILED - 检查 docker logs aicc-backend"
            fi

            echo "检查 postgres..."
            if docker exec aicc-postgres pg_isready -U aicc >/dev/null 2>&1; then
              echo "  postgres: OK"
            else
              echo "  postgres: FAILED"
            fi

            echo "检查 redis..."
            if docker exec aicc-redis redis-cli ping 2>/dev/null | grep -q PONG; then
              echo "  redis: OK"
            else
              echo "  redis: FAILED"
            fi

            echo "检查 minio..."
            if curl -sf http://localhost:9000/minio/health/live >/dev/null 2>&1; then
              echo "  minio: OK"
            else
              echo "  minio: FAILED"
            fi

            # ---- 6. 清理悬空镜像 ----
            echo "[5/6] 清理悬空镜像..."
            docker image prune -f 2>/dev/null | tail -1

            # ---- 完成 ----
            echo "[6/6] 部署完成!"
            echo "=========================================="
            docker compose -f docker-compose.prod.yml ps
            echo "=========================================="
            echo "访问: http://${{ secrets.SSH_HOST }}"
            echo "完成时间: $(date '+%Y-%m-%d %H:%M:%S')"
