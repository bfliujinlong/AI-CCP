apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aicc-backend-hpa
  namespace: aicc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aicc-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aicc-frontend-hpa
  namespace: aicc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aicc-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
