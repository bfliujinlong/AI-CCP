apiVersion: apps/v1
kind: Deployment
metadata:
  name: aicc-frontend
  namespace: aicc
  labels:
    app: aicc-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aicc-frontend
  template:
    metadata:
      labels:
        app: aicc-frontend
    spec:
      containers:
        - name: frontend
          image: YOUR_REGISTRY/aicc-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aicc-frontend
  namespace: aicc
spec:
  selector:
    app: aicc-frontend
  ports:
    - port: 80
      targetPort: 80
