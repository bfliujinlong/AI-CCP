apiVersion: v1
kind: Secret
metadata:
  name: aicc-secret
  namespace: aicc
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://aicc:CHANGE_ME_PASSWORD@aicc-postgres:5432/aicc"
  REDIS_URL: "redis://aicc-redis:6379/0"
  MINIO_ACCESS_KEY: "aicc_minio"
  MINIO_SECRET_KEY: "CHANGE_ME_MINIO_SECRET"
  JWT_SECRET: "CHANGE_ME_JWT_SECRET_PRODUCTION"
  QWEN_API_KEY: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: aicc-db-secret
  namespace: aicc
type: Opaque
stringData:
  POSTGRES_DB: "aicc"
  POSTGRES_USER: "aicc"
  POSTGRES_PASSWORD: "CHANGE_ME_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: aicc-minio-secret
  namespace: aicc
type: Opaque
stringData:
  MINIO_ROOT_USER: "aicc_minio"
  MINIO_ROOT_PASSWORD: "CHANGE_ME_MINIO_SECRET"
