apiVersion: apps/v1
kind: Deployment
metadata:
  name: aicc-backend
  namespace: aicc
  labels:
    app: aicc-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aicc-backend
  template:
    metadata:
      labels:
        app: aicc-backend
    spec:
      initContainers:
        - name: db-migrate
          image: YOUR_REGISTRY/aicc-backend:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: aicc-secret
            - configMapRef:
                name: aicc-config
      containers:
        - name: backend
          image: YOUR_REGISTRY/aicc-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: aicc-secret
            - configMapRef:
                name: aicc-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aicc-backend
  namespace: aicc
spec:
  selector:
    app: aicc-backend
  ports:
    - port: 8000
      targetPort: 8000
