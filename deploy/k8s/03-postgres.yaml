apiVersion: apps/v1
kind: Deployment
metadata:
  name: aicc-postgres
  namespace: aicc
  labels:
    app: aicc-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aicc-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: aicc-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: aicc-db-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "aicc"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "aicc"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: aicc-postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aicc-postgres-pvc
  namespace: aicc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: alicloud-disk-ssd
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: aicc-postgres
  namespace: aicc
spec:
  selector:
    app: aicc-postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
