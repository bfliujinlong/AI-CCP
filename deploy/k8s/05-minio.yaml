apiVersion: apps/v1
kind: Deployment
metadata:
  name: aicc-minio
  namespace: aicc
  labels:
    app: aicc-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aicc-minio
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: aicc-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          envFrom:
            - secretRef:
                name: aicc-minio-secret
          volumeMounts:
            - name: minio-data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: aicc-minio-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aicc-minio-pvc
  namespace: aicc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: alicloud-disk-ssd
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: aicc-minio
  namespace: aicc
spec:
  selector:
    app: aicc-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
